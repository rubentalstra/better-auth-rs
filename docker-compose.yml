# Test/dev backing services for the adapter conformance suite, integration tests,
# and the differential harness. Mirrors the database matrix in better-auth's e2e CI;
# v1 needs postgres + redis (more services are added as adapters land).
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: better_auth
      POSTGRES_PASSWORD: better_auth
      POSTGRES_DB: better_auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U better_auth"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
