name: Bug report
description: Report a bug in better-auth-rs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please fill out the sections below so we can reproduce it quickly.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps or a small code sample that triggers the bug.
      placeholder: |
        1. Configure better-auth-rs with `...`
        2. Call `...`
        3. Observe `...`
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behavior
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: better-auth-rs version (crate version or git SHA)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `rustc --version`, your OS, and enabled Cargo features.
      render: text
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Core / data model
        - Database adapter (sqlx-postgres / memory)
        - API / routes
        - Crypto / cookies / sessions
        - OAuth / social providers
        - A plugin (specify below)
        - axum integration
        - Other
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Auth configuration
      description: How you built the auth instance (redact secrets).
      render: rust
      placeholder: |
        let auth = BetterAuth::builder()
            // ...
            .build();
  - type: textarea
    id: context
    attributes:
      label: Additional context
