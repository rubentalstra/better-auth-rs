name: Feature request
description: Suggest an idea or improvement for better-auth-rs
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What's missing or painful today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: input
    id: upstream
    attributes:
      label: Upstream parallel
      description: If this exists in better-auth, link the plugin/feature so we can match it 1:1.
  - type: textarea
    id: context
    attributes:
      label: Additional context
