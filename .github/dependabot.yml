version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    labels: ["dependencies"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: sunday
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci(deps)"
